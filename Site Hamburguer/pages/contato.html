<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hambúrgueria 543 - Contato</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="body-contato">
    <header class="menu">

        <!-- A navbar seria o cabeçalho, a parte de cima que tem as coisas. -->
        <nav class="nav-bar">

            <a href="../index.html" class="area-logo">
                <img src="../IMG/Hambúrguer1.png" alt="Logo Hambúrguer" id="logo">
            </a>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">HOME</a>
                </li>
                <li class="nav-item">
                    <a href="../pages/hamburguer.html" class="nav-link">HAMBÚRGUERS</a>
                </li>
                <li class="nav-item">
                    <a href="../pages/cadastro.html" class="nav-link">CADASTRO</a>
                </li>
                <li class="nav-item">
                    <a href="../pages/contato.html" class="nav-link">CONTATO</a>
                </li>
                
            </ul>

            <a href="../pages/login.html" class="area-login">
                <button class="login">LOGAR</button>
            </a>

        </nav>
        
    </header>

    <div class="box-cadastro">
        <form action="">
            <fieldset>
                <legend>FAÇA SEU PEDIDO AQUI</legend>

                <!-- Campo de nome -->
                <div class="inputBoxContato">
                    <label for="nome" class="labelContato">Nome completo</label>
                    <input type="name" name="nome" id="nome" class="inputContato" requised>
                </div>

                <!-- Campo de email -->
                <div class="inputBoxContato">
                    <label for="email" class="labelContato">Email</label>
                    <input type="email" name="email" id="email" class="inputContato" requised>
                </div>

                <!-- Campo de telefone -->
                <div class="inputBoxContato">
                    <label for="telefone" class="labelContato">Telefone</label>
                    <input type="tel" name="telefone" id="telefone" class="inputContato" requised>
                </div>

                <!-- Campo de mensagem -->
                <div class="inputBoxContato">
                    <label for="mensagem" class="labelContato">Mensagem</label>
                    <textarea name="mensagem" id="mensagem" ></textarea>
                </div>

                <!-- Botão de enviar -->
                <input type="submit" value="ENVIAR" name="submit" id="submit" class="submitContato">
                
            </fieldset>
        </form>
    </div>

</body>
</html>
